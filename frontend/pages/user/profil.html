<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil - MedWaste</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="user-theme">
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">MW</div>
        <div>
          <h2 data-user-name>Pengguna</h2>
          <small>MedWaste</small>
        </div>
      </div>
      <nav class="nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="edukasi.html">Edukasi</a>
        <a href="penyerahan.html">Pengajuan</a>
        <a href="riwayat.html">Riwayat</a>
        <a class="active" href="profil.html">Profil</a>
      </nav>
      <a class="btn btn-light logout" href="login.html" data-logout>Logout</a>
    </aside>

    <main class="main">
      <div class="topbar simple-topbar">
        <h1>Profil</h1>
      </div>
      <section class="profile-layout">
        <div class="card profile-info-card">
          <h3>Informasi Akun</h3>
          <p>Pastikan nama, email, dan nomor HP aktif agar admin dapat memverifikasi penyerahan limbah dengan lebih mudah.</p>
        </div>
        <div class="card">
          <h3>Edit Profil</h3>
          <form id="profileForm">
            <div class="form-group">
              <label>Nama</label>
              <input name="nama" required>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input name="email" type="email" required>
            </div>
            <div class="form-group">
              <label>Nomor HP</label>
              <input name="hp" required>
            </div>
            <div class="profile-actions">
              <button class="btn btn-primary">Simpan Profil</button>
              <button class="btn btn-light" id="openPasswordModal" type="button">Ganti Password</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script src="../../js/data.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/user.js"></script>
</body>
</html>

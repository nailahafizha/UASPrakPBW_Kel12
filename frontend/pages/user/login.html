<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MedWaste</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="auth-page user-theme">
  <main class="auth-card">
    <div class="brand auth-brand">
      <div class="logo">MW</div>
      <div>
        <h1>MedWaste</h1>
        <p class="subtitle">Login sebagai pengguna</p>
      </div>
    </div>

    <form data-auth="user-login">
      <div class="form-group">
        <label>Email</label>
        <input name="email" type="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input name="password" type="password" required autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-full">Login</button>
    </form>

    <div class="auth-links">
      <a href="register.html">Buat akun</a>
      <a href="forgot-password.html">Lupa password?</a>
      <a href="../admin/login-admin.html">Login admin</a>
    </div>
  </main>

  <script src="../../js/data.js"></script>
  <script src="../../js/auth.js"></script>
</body>
</html>

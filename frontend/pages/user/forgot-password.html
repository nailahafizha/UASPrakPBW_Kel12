<!DOCTYPE html>
<html lang="id">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width,initial-scale=1.0" name="viewport"/>
  <title>
   Lupa Password - MedWaste
  </title>
  <link href="../../css/style.css" rel="stylesheet"/>
 </head>
 <body class="auth-page user-theme">
  <main class="auth-card">
   <div class="brand">
    <div class="logo">
     MW
    </div>
    <div>
     <h1>
      Lupa Password
     </h1>
     <p class="subtitle">
      Masukkan email untuk menerima instruksi reset.
     </p>
    </div>
   </div>
   <form data-auth="forgot">
    <div class="form-group">
     <label>
      Email
     </label>
     <input required="" type="email"/>
    </div>
    <button class="btn btn-primary btn-full">
     Kirim Link Reset
    </button>
   </form>
   <div class="auth-links">
    <a href="login.html">
     Kembali ke login
    </a>
   </div>
  </main>
  <script src="../../js/data.js">
  </script>
  <script src="../../js/auth.js">
  </script>
 </body>
</html>
